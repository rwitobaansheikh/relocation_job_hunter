name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.cloudflared.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Prepare deployment files
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          mkdir -p deploy_bundle
          cp docker-compose.yml deploy_bundle/docker-compose.yml
          cp docker-compose.cloudflared.yml deploy_bundle/docker-compose.cloudflared.yml
          # Compose .env: app secrets + the exact image tag to run.
          printf '%s\n' "$APP_ENV" > deploy_bundle/.env
          echo "ECR_IMAGE=$IMAGE" >> deploy_bundle/.env

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy_bundle/docker-compose.yml,deploy_bundle/docker-compose.cloudflared.yml,deploy_bundle/.env"
          target: "/opt/app"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/app
            # Authenticate Docker to ECR using the instance's IAM role.
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin "$(echo "${{ steps.image.outputs.image }}" | cut -d'/' -f1)"
            COMPOSE="-f docker-compose.yml"
            if grep -qE '^CLOUDFLARE_TUNNEL_TOKEN=.+$' .env; then
              COMPOSE="$COMPOSE -f docker-compose.cloudflared.yml"
            fi
            docker compose $COMPOSE pull
            docker compose $COMPOSE up -d --remove-orphans
            docker image prune -f
