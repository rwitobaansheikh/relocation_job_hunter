name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.cloudflared.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Prepare deployment files
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          mkdir -p deploy_bundle
          cp docker-compose.yml deploy_bundle/docker-compose.yml
          cp docker-compose.cloudflared.yml deploy_bundle/docker-compose.cloudflared.yml
          # Compose .env: app secrets + the exact image tag to run.
          printf '%s\n' "$APP_ENV" > deploy_bundle/.env
          echo "ECR_IMAGE=$IMAGE" >> deploy_bundle/.env

      - name: Deploy on EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail
          REGION="${AWS_REGION}"
          INSTANCE_ID="${INSTANCE_ID}"
          if [[ -z "${INSTANCE_ID}" ]]; then
            echo "Missing GitHub secret EC2_INSTANCE_ID (terraform output instance_id)."
            exit 1
          fi

          tar -czf /tmp/deploy_bundle.tgz -C deploy_bundle .
          BUNDLE_B64=$(base64 -w0 /tmp/deploy_bundle.tgz)

          REMOTE=$(cat <<'EOS'
          set -euo pipefail
          mkdir -p /opt/app
          echo "__BUNDLE__" | base64 -d | tar -xzf - -C /opt/app
          cd /opt/app
          REGISTRY=$(grep '^ECR_IMAGE=' .env | cut -d= -f2- | cut -d/ -f1)
          aws ecr get-login-password --region __REGION__ | docker login --username AWS --password-stdin "$REGISTRY"
          COMPOSE="-f docker-compose.yml"
          grep -qE '^CLOUDFLARE_TUNNEL_TOKEN=.+$' .env && COMPOSE="$COMPOSE -f docker-compose.cloudflared.yml"
          docker compose $COMPOSE pull
          docker compose $COMPOSE up -d --remove-orphans
          docker image prune -f
          if ! docker compose exec -T ollama ollama list 2>/dev/null | grep -q 'llama3.2:1b'; then
            docker compose exec -T ollama ollama pull llama3.2:1b
          fi
          EOS
          )
          REMOTE="${REMOTE//__BUNDLE__/$BUNDLE_B64}"
          REMOTE="${REMOTE//__REGION__/$REGION}"

          PARAMS=$(jq -n --arg cmd "$REMOTE" '{commands: [$cmd]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 900 \
            --comment "Deploy ${{ github.sha }}" \
            --parameters "$PARAMS" \
            --output text \
            --query 'Command.CommandId')
          echo "SSM command: $COMMAND_ID"

          for i in $(seq 1 90); do
            INV=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --output json)
            STATUS=$(echo "$INV" | jq -r '.Status')
            echo "Status: $STATUS ($i/90)"
            if [[ "$STATUS" == "Success" ]]; then
              echo "$INV" | jq -r '.StandardOutputContent'
              echo "$INV" | jq -r '.StandardErrorContent' >&2
              exit 0
            fi
            if [[ "$STATUS" =~ ^(Failed|Cancelled|TimedOut)$ ]]; then
              echo "$INV" | jq -r '.StandardOutputContent'
              echo "$INV" | jq -r '.StandardErrorContent' >&2
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for SSM command."
          exit 1
